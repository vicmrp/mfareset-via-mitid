services:
  web:
    build: .
    container_name: mitid-app

    environment:
      - SQLITE_PATH=/data/db.sqlite3
      - DJANGO_SETTINGS_MODULE=config.settings

    volumes:
      - mitid-data:/data

    ports:
      - "8000:8000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mitid-data:

